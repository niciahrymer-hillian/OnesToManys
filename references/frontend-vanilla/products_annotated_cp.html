<!-- [FILE] products_annotated_cp.html -->
<!-- [WHY] Vanilla product CRUD page scoped to selected manufacturer. -->
<!-- [EFFECT] Users can manage detail records and search within products. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products | Vanilla UI</title>
    <link rel="stylesheet" href="../../frontend-vanilla/assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <button id="menuToggle" class="menu-toggle" aria-label="Open menu">≡</button>
      <h1>Products</h1>
      <span class="mode-badge">Mode: Vanilla JS</span>
    </header>

    <p class="archive-banner">Archive / Demo Mode: React is the canonical frontend for active development.</p>

    <nav id="pancakeMenu" class="pancake-menu" aria-label="Main navigation">
      <a href="../../frontend-vanilla/index.html" data-page="home">Home</a>
      <a href="../../frontend-vanilla/manufacturers.html" data-page="manufacturers">Manufacturers</a>
      <a href="../../frontend-vanilla/products.html" data-page="products">Products</a>
      <a href="../../frontend-launcher/index.html" data-page="launcher">Unified Launcher</a>
      <a href="http://127.0.0.1:5173" data-page="react" target="_blank" rel="noreferrer">React Primary</a>
    </nav>

    <main class="layout">
      <section class="panel">
        <div class="page-links" aria-label="Quick navigation">
          <a class="quick-link" href="../../frontend-vanilla/index.html">Home</a>
          <a class="quick-link" href="../../frontend-vanilla/manufacturers.html">Manufacturers</a>
          <a class="quick-link" href="../../frontend-launcher/index.html">Unified Launcher</a>
        </div>
        <h2>Manufacturer Context</h2>
        <label>
          Manufacturer
          <select id="manufacturerSelect"></select>
        </label>
        <label>
          Search Products
          <input id="productSearch" class="search-input" placeholder="Search by product, category, description" />
        </label>
      </section>

      <section class="panel">
        <h3>Create / Edit Product</h3>
        <form id="productForm" class="form-grid">
          <label>Product Name<input name="product_name" required /></label>
          <label>Category<input name="category" required /></label>
          <label>Price<input name="price" type="number" step="0.01" min="0" required /></label>
          <label>Stock Quantity<input name="stock_quantity" type="number" min="0" required /></label>
          <label>Description<textarea name="description" rows="2"></textarea></label>
          <div class="actions">
            <button type="submit" id="productSubmitBtn">Add Product</button>
            <button type="button" id="cancelEditBtn" class="ghost" disabled>Cancel Edit</button>
          </div>
        </form>
        <p id="productError" class="error"></p>
      </section>

      <section class="panel">
        <h3>Products</h3>
        <div class="table" id="productTable"></div>
      </section>
    </main>

    <script src="../../frontend-vanilla/scripts/api.js"></script>
    <script src="../../frontend-vanilla/scripts/nav.js"></script>
    <script src="../../frontend-vanilla/scripts/products.js"></script>
  </body>
</html>
